name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}
      IMAGE_TAG: ${{ vars.IMAGE_TAG }}
      CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/tmp/pense-production/"

      - name: Deploy to Production EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e  # Exit immediately if any command fails

            # Set environment variables
            export IMAGE_NAME="${{ env.IMAGE_NAME }}"
            export IMAGE_TAG="${{ env.IMAGE_TAG }}"
            export CONTAINER_NAME="${{ env.CONTAINER_NAME }}"
            export PORT="${{ secrets.PORT }}"
            export DOCS_USERNAME="${{ secrets.DOCS_USERNAME }}"
            export DOCS_PASSWORD="${{ secrets.DOCS_PASSWORD }}"
            export CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}"
            export JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}"
            export JWT_EXPIRATION_HOURS="${{ secrets.JWT_EXPIRATION_HOURS }}"
            export GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            export DEEPGRAM_API_KEY="${{ secrets.DEEPGRAM_API_KEY }}"
            export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            export CARTESIA_API_KEY="${{ secrets.CARTESIA_API_KEY }}"
            export SMALLEST_API_KEY="${{ secrets.SMALLEST_API_KEY }}"
            export GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
            export GOOGLE_APPLICATION_CREDENTIALS="${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}"
            export GOOGLE_CLOUD_PROJECT_ID="${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}"
            export GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}"
            export SARVAM_API_KEY="${{ secrets.SARVAM_API_KEY }}"
            export ELEVENLABS_API_KEY="${{ secrets.ELEVENLABS_API_KEY }}"
            export OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"
            export OPENROUTER_ALLOWED_PROVIDERS="${{ vars.OPENROUTER_ALLOWED_PROVIDERS }}"
            export S3_OUTPUT_BUCKET="${{ secrets.S3_OUTPUT_BUCKET }}"
            export DB_ROOT_DIR="${{ secrets.DB_ROOT_DIR }}"
            export APP_FOLDER_PATH="${{ secrets.APP_FOLDER_PATH }}"
            export DEFAULT_USER_EMAIL="${{ secrets.DEFAULT_USER_EMAIL }}"
            export DEFAULT_USER_FIRST_NAME="${{ secrets.DEFAULT_USER_FIRST_NAME }}"
            export DEFAULT_USER_LAST_NAME="${{ secrets.DEFAULT_USER_LAST_NAME }}"
            export SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
            export SENTRY_ENVIRONMENT="${{ secrets.SENTRY_ENVIRONMENT }}"
            export SENTRY_TRACES_SAMPLE_RATE="${{ secrets.SENTRY_TRACES_SAMPLE_RATE }}"
            export SENTRY_PROFILES_SAMPLE_RATE="${{ secrets.SENTRY_PROFILES_SAMPLE_RATE }}"
            export ENVIRONMENT="${{ secrets.ENVIRONMENT }}"
            export ENABLE_TRACING="${{ secrets.ENABLE_TRACING }}"
            export OTEL_EXPORTER_OTLP_ENDPOINT="${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}"
            export OTEL_EXPORTER_OTLP_HEADERS="${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}"
            export LANGFUSE_TRACING_ENVIRONMENT="${{ secrets.LANGFUSE_TRACING_ENVIRONMENT }}"
            export LANGFUSE_HOST="${{ secrets.LANGFUSE_HOST }}"
            export LANGFUSE_BASE_URL="${{ secrets.LANGFUSE_BASE_URL }}"
            export LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}"
            export LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}"
            export MAX_CONCURRENT_JOBS="${{ secrets.MAX_CONCURRENT_JOBS }}"
            export MAX_CONCURRENT_JOBS_PER_USER="${{ secrets.MAX_CONCURRENT_JOBS_PER_USER }}"
            export DEFAULT_MAX_ROWS_PER_EVAL="${{ vars.DEFAULT_MAX_ROWS_PER_EVAL }}"
            export SUPERADMIN_EMAIL="${{ secrets.SUPERADMIN_EMAIL }}"

            # Navigate to directory with docker-compose.yml
            cd /tmp/pense-production

            # Run new container with docker compose (pull always to ensure latest image)
            docker compose -p pense-production pull && docker compose -p pense-production up -d

            # Clean up old images
            docker image prune -f

            echo "🎉 Production deployment completed successfully!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export CONTAINER="${{ env.CONTAINER_NAME }}"
            sleep 10
            if docker ps | grep -q $CONTAINER; then
              echo "✅ Deployment successful!"
              docker logs --tail 20 $CONTAINER
            else
              echo "❌ Deployment failed!"
              docker logs $CONTAINER
              exit 1
            fi
