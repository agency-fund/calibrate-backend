name: Check publish gate
description: >-
  Sets publish_enabled when both SDK_AUTO_PUBLISH_ENABLED and
  PUSH_TO_REPO_TOKEN are set (non-empty Production secrets). Used by
  auto-publish-sdk.yml and publish-sdk.yml.

inputs:
  sdk_auto_publish_enabled:
    description: Value of the SDK_AUTO_PUBLISH_ENABLED Production secret
    required: false
    default: ""
  push_to_repo_token:
    description: Value of the PUSH_TO_REPO_TOKEN Production secret
    required: false
    default: ""

outputs:
  publish_enabled:
    description: Whether SDK/CLI publish prerequisites are met
    value: ${{ steps.check.outputs.publish_enabled }}

runs:
  using: composite
  steps:
    - name: Check publish prerequisites
      id: check
      shell: bash
      env:
        SDK_AUTO_PUBLISH_ENABLED: ${{ inputs.sdk_auto_publish_enabled }}
        PUSH_TO_REPO_TOKEN: ${{ inputs.push_to_repo_token }}
      run: |
        # Enabled as long as both secrets are set (non-empty).
        # Never print secret values — only whether each is set, plus lengths.
        #
        # IMPORTANT: the output value must NOT collide with a secret value.
        # If SDK_AUTO_PUBLISH_ENABLED's value is the string "true", GitHub masks
        # it everywhere and will "Skip output '...' since it may contain secret",
        # leaving the output empty. So we emit "yes"/"no" (see consumers' if:).
        if [ -n "$SDK_AUTO_PUBLISH_ENABLED" ]; then sdk_set=yes; else sdk_set=no; fi
        if [ -n "$PUSH_TO_REPO_TOKEN" ]; then tok_set=yes; else tok_set=no; fi

        echo "::group::Publish gate evaluation"
        echo "SDK_AUTO_PUBLISH_ENABLED set: $sdk_set (length ${#SDK_AUTO_PUBLISH_ENABLED})"
        echo "PUSH_TO_REPO_TOKEN set:      $tok_set (length ${#PUSH_TO_REPO_TOKEN})"

        if [ "$sdk_set" = yes ] && [ "$tok_set" = yes ]; then
          echo "Decision: publish_enabled=yes (both secrets present)"
          echo "::endgroup::"
          echo "publish_enabled=yes" >> "$GITHUB_OUTPUT"
        else
          reason="publish blocked:"
          [ "$sdk_set" = no ] && reason="$reason SDK_AUTO_PUBLISH_ENABLED is empty/unset (check the Production environment secret);"
          [ "$tok_set" = no ] && reason="$reason PUSH_TO_REPO_TOKEN is empty/unset (check the Production environment secret);"
          echo "Decision: publish_enabled=no"
          echo "::endgroup::"
          echo "::warning::$reason"
          echo "publish_enabled=no" >> "$GITHUB_OUTPUT"
        fi
