# Fern SDK generation config.
#
# API definition: fetched live from the running backend's PUBLIC spec endpoint
# (`/public-api/openapi.json`, which returns only `Public API`-tagged routes).
# The publish workflow boots the app and points Fern at localhost, so the SDK is
# generated from the current code; to generate/preview locally, run the server
# the same way (`cd src && uv run uvicorn main:app`). Clean SDK method names come
# from openapi-overrides.yml (keep that list in sync with the public routes —
# see CLAUDE.md). Publish is driven by .github/workflows/publish-sdk.yml on an
# `sdk-v*` tag; version = tag minus the `sdk-v` prefix.
api:
  specs:
    # openapi/openapi.json is fetched (gitignored) from the running app's
    # /public-api/openapi.json by the publish workflow (a plain curl) before
    # generating; overrides add clean SDK method names.
    - openapi: ./openapi/openapi.json
      overrides: ./openapi-overrides.yml
groups:
  python-sdk:
    generators:
      # Pinned for reproducible builds — a `latest` generator could silently
      # change the SDK's shape (renamed methods, etc.) and publish it. Bump
      # deliberately with `fern generator upgrade --group python-sdk`;
      # validate-sdk.yml re-runs `fern check` on that PR.
      - name: fernapi/fern-python-sdk
        version: 5.15.2
        output:
          location: pypi
          package-name: calibrate-python-sdk
          token: ${PYPI_TOKEN}
        config:
          client_class_name: Calibrate
